  gateway:
    container_name: "gateway"
    image: "gateway:latest"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      DOTNET_gcServer: "0"
      USERSERVICE_HTTP: "http://userservice:8080"
      services__userservice__http__0: "http://userservice:8080"
      PROPERTYSERVICE_HTTP: "http://propertyservice:8080"
      services__propertyservice__http__0: "http://propertyservice:8080"
      BOOKINGSERVICE_HTTP: "http://bookingservice:8080"
      services__bookingservice__http__0: "http://bookingservice:8080"
      PAYMENTSERVICE_HTTP: "http://paymentservice:8080"
      services__paymentservice__http__0: "http://paymentservice:8080"
      SEARCHSERVICE_HTTP: "http://searchservice:8080"
      services__searchservice__http__0: "http://searchservice:8080"
      CHATSERVICE_HTTP: "http://chatservice:8080"
      services__chatservice__http__0: "http://chatservice:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "gateway"
    ports:
    - target: 8080
      published: 10012
    - target: 8443
      published: 10013
    restart: unless-stopped
volumes:
  airbnb_pg_data: {}
  airbnb_kafka_data: {}
  airbnb_rabbit_data: {}
  airbnb_es_data: {}
  airbnb_redis_data: {}
