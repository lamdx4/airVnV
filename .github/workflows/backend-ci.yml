name: Backend CI/CD

on:
  push:
    branches: ["main", "release"]
    paths:
      - "src/**"
      - "Airbnb.*/**"
      - "*.sln"
      - "*.slnx"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "Airbnb.*/**"
      - "*.sln"
      - "*.slnx"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  check-backend:
    name: Check Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore Airbnb.slnx

      - name: Build
        run: dotnet build Airbnb.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Airbnb.slnx -c Release --no-build --verbosity normal || echo "Tests skipped or failed."

  build-push-backend:
    name: Build & Push Backend
    needs: check-backend
    if: github.ref == 'refs/heads/release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Output Aspire CLI version
        run: aspire --version

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images using Aspire CLI
        env:
          REGISTRY_ENDPOINT: ${{ env.REGISTRY }}
          REGISTRY_REPOSITORY: ${{ github.repository }}
        run: |
          aspire do push \
            --apphost Airbnb.AppHost/Airbnb.AppHost.csproj

      - name: Generate Docker Compose Manifest
        run: |
          aspire publish \
            --apphost Airbnb.AppHost/Airbnb.AppHost.csproj

      - name: Upload Compose File as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-compose
          path: Airbnb.AppHost/aspire-output/
