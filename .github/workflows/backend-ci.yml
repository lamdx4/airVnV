name: Backend CI/CD

on:
  push:
    branches: ["main", "release"]
    paths:
      - "src/**"
      - "Airbnb.*/**"
      - "*.sln"
      - "*.slnx"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "Airbnb.*/**"
      - "*.sln"
      - "*.slnx"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  check-backend:
    name: Check Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore Airbnb.slnx

      - name: Build
        run: dotnet build Airbnb.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Airbnb.slnx -c Release --no-build --verbosity normal || echo "Tests skipped or failed."

  build-push-backend:
    name: Build & Push Backend
    needs: check-backend
    if: github.ref == 'refs/heads/release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, Push and Generate Compose (Native Aspire 9)
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Cài đặt bộ công cụ Aspire CLI chính chủ từ Microsoft
          dotnet tool install -g aspire.cli --prerelease
          
          DOTNET_ENVIRONMENT=Production \
          ContainerRegistry=${{ env.REGISTRY }} \
          ContainerRepositoryPrefix=$REPO_LOWER \
          ContainerImageTag=latest \
          aspire publish \
            --project Airbnb.AppHost/Airbnb.AppHost.csproj \
            --publisher docker-compose \
            --output-path ./release-artifact

      - name: Create Zip Archive
        run: |
          mkdir -p release-artifact/infras
          cp -r infras/monitoring release-artifact/infras/
          cd release-artifact
          zip -r ../airbnb-backend-release.zip .

      - name: Upload as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: airbnb-backend-release
          path: airbnb-backend-release.zip

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/release'
        uses: softprops/action-gh-release@v2
        with:
          files: airbnb-backend-release.zip
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          body: "Automated release containing Docker Compose and Env files for production."
          draft: false
          prerelease: false
